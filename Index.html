<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>🎬 影片播放網站</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: Arial;
}

video {
  width: 80%;
  margin-top: 20px;
}

button {
  margin: 5px;
  padding: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🎬 我的影片播放器</h1>

<video id="player" controls></video>

<br>

<button onclick="playVideo('video1')">影片1</button>
<button onclick="playVideo('video2')">影片2</button>
<button onclick="playVideo('video3')">影片3</button>
<button onclick="playVideo('video4')">影片4</button>

<script>
const video = document.getElementById('player');
let hls;

function playVideo(folder) {
  const src = 'videos/' + folder + '/index.m3u8';

  if (hls) {
    hls.destroy(); // 清掉舊影片（很重要）
  }

  if (Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(src);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, function () {
      video.play();
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = src;
    video.play();
  }
}

// 預設播放第一支
playVideo('video1');
</script>

</body>
</html>
